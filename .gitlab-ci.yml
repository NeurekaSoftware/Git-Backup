stages:
  - build

include:
  - component: $CI_SERVER_FQDN/components/docker/build@1.0.0
    inputs:
      job-name: docker-edge
      tag: edge
      platforms: linux/amd64,linux/arm64
      build-args: >-
        --build-arg GIT_TAG=edge
        --build-arg GIT_HASH=$CI_COMMIT_SHA

# The component ships no rules, so scope its job to main-branch pushes.
docker-edge:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Fast lint/test gate for the crate, in the same stage as docker-edge and independent of it.
rust-check:
  stage: build
  image: rust:1-bookworm
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  cache:
    key: rust-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo
      - target
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - rustup component add clippy rustfmt
  script:
    - cargo fmt --check
    - cargo clippy --all-targets -- -D warnings
    - cargo test --locked
    - cargo build --release --locked
